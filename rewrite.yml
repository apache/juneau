---
# Import style: never fold to star imports so retargets to Shorts stay as
# specific `import static ...Shorts.<token>;` lines (avoids Shorts.* colliding
# with co-imported domain wildcards such as CollectionUtils.*/ThrowableUtils.*).
type: specs.openrewrite.org/v1beta/style
name: org.apache.juneau.NoStarImports
displayName: Never fold to star imports
styleConfigs:
  - org.openrewrite.java.style.ImportLayoutStyle:
      classCountToUseStarImport: 2147483647
      nameCountToUseStarImport: 2147483647
---
# Phase 2.5 — memoize/memoizer retarget
type: specs.openrewrite.org/v1beta/recipe
name: org.apache.juneau.ShortsMigrateMemoize
displayName: Retarget Utils.memoize/memoizer to Suppliers (Phase 2.5)
description: >
  memoize and memoizer have no Shorts alias; they go directly to
  org.apache.juneau.commons.function.Suppliers.  Run this after Phase 2
  has moved the bodies into Suppliers and while Utils still has delegators.
recipeList:
  - org.openrewrite.java.ChangeMethodTargetToStatic:
      methodPattern: org.apache.juneau.commons.utils.Utils memoize(..)
      fullyQualifiedTargetTypeName: org.apache.juneau.commons.function.Suppliers
  - org.openrewrite.java.ChangeMethodTargetToStatic:
      methodPattern: org.apache.juneau.commons.utils.Utils memoizer(..)
      fullyQualifiedTargetTypeName: org.apache.juneau.commons.function.Suppliers
---
# Phase 4 — all non-mega shorts
