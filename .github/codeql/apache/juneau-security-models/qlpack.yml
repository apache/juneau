#
# CodeQL model pack (data-extension only, no queries/dependencies) that teaches the
# standard `codeql/java-all` query pack about juneau's own path-traversal sanitizer
# funnel, `FileUtils.resolveSafely(...)` / `FileUtils.resolveVirtualPathSafely(...)`.
#
# This is a *local* model pack -- it is not published to a registry. It is loaded by
# the CodeQL Action via the `--additional-packs` / `--extension-packs` CLI flags set
# through `CODEQL_ACTION_EXTRA_OPTIONS` on the analyze step in
# `.github/workflows/codeql-analysis.yml` (see the comment there for why the
# `packs:` field in a codeql-config.yml cannot be used for unpublished local packs).
#
# See TODO-240 (.work/todo/TODO-240-codeql-resolvesafely-sanitizer-model.md) for the
# motivating context.
name: apache/juneau-security-models
version: 0.0.1
library: true
extensionTargets:
  codeql/java-all: "*"
dataExtensions:
  - models/**/*.yml
