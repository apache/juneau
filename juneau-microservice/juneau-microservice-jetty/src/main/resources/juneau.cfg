#=======================================================================================================================
# Default configuration shipped by juneau-microservice-jetty.
#
# Loaded from the classpath by Microservice's config resolver when no working-directory or earlier-classpath
# *.cfg is found.  Consumers can override any section by dropping their own juneau.cfg (or another candidate
# config name) on the working directory or earlier on the classpath.
#=======================================================================================================================

#=======================================================================================================================
# Jetty settings
#=======================================================================================================================
[Jetty]

# Path of the jetty.xml file used to configure the Jetty server.
# JettyServerComponent searches the working directory first, then the classpath, so the bundled jetty.xml
# wins as the default but a consumer-supplied jetty.xml in the working dir overrides it.
config = jetty.xml

# Resolve Juneau variables in the jetty.xml file.
resolveVars = true

# Port to use for the Jetty server.
# Multiple ports may be specified; the first available wins.  '0' indicates a random port.
# The resolved port gets set as the system property "availablePort", referenced in jetty.xml as "$S{availablePort}".
port = 10000,0,0,0

#=======================================================================================================================
# REST settings
#=======================================================================================================================
[REST]

# Stylesheet to use for HTML views.
# Used by BasicRestConfig:
# 	stylesheet="$C{REST/theme,servlet:/htdocs/themes/devops.css}"
theme = servlet:/htdocs/themes/devops.css

#=======================================================================================================================
# Console settings
#=======================================================================================================================
[Console]

enabled = true

# Built-in console commands (exit, restart, help, config).  Implementations require a no-arg constructor.
# Override Microservice.createConsoleCommands() to contribute commands programmatically.
commands =
	org.apache.juneau.microservice.console.ExitCommand,
	org.apache.juneau.microservice.console.RestartCommand,
	org.apache.juneau.microservice.console.HelpCommand,
	org.apache.juneau.microservice.console.ConfigCommand

#=======================================================================================================================
# Logging settings
#=======================================================================================================================
[Logging]

# Directory used for log files; referenced from jetty.xml's request-log filename.
logDir = logs

#=======================================================================================================================
# System properties
#-----------------------------------------------------------------------------------------------------------------------
# Arbitrary system properties set during microservice startup.
#=======================================================================================================================
[SystemProperties]

# Route Jetty's logging through java-util logging via the bundled JettyLogger SLF4J adapter.
org.eclipse.jetty.util.log.class = org.apache.juneau.microservice.jetty.JettyLogger

# Jetty log level.  Allowed values: ALL, DEBUG, INFO, WARN, OFF
org.eclipse.jetty.LEVEL = WARN
